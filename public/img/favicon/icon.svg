<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1547"/>
      <stop offset="100%" stop-color="#001a8f"/>
    </linearGradient>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c8d8ff"/>
      <stop offset="100%" stop-color="#4d7fff"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4d7fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4d7fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#819ffe" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Neural network layer behind R — represents AI merging -->
  <!-- Nodes -->
  <circle cx="380" cy="100" r="5" fill="#4d7fff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="420" cy="160" r="4" fill="#819ffe" opacity="0.5" filter="url(#glow)"/>
  <circle cx="350" cy="180" r="3" fill="#4d7fff" opacity="0.4"/>
  <circle cx="440" cy="240" r="4" fill="#819ffe" opacity="0.5" filter="url(#glow)"/>
  <circle cx="400" cy="300" r="3" fill="#4d7fff" opacity="0.4"/>
  <circle cx="430" cy="370" r="5" fill="#819ffe" opacity="0.5" filter="url(#glow)"/>
  <circle cx="380" cy="420" r="4" fill="#4d7fff" opacity="0.4"/>

  <!-- Neural connections from R's edge into AI nodes -->
  <line x1="340" y1="150" x2="380" y2="100" stroke="#4d7fff" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="150" x2="420" y2="160" stroke="#4d7fff" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="180" x2="420" y2="160" stroke="#4d7fff" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="180" x2="440" y2="240" stroke="#4d7fff" stroke-width="1" opacity="0.25"/>
  <line x1="380" y1="270" x2="440" y2="240" stroke="#4d7fff" stroke-width="1" opacity="0.3"/>
  <line x1="380" y1="270" x2="400" y2="300" stroke="#4d7fff" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="300" x2="430" y2="370" stroke="#4d7fff" stroke-width="1" opacity="0.3"/>
  <line x1="430" y1="370" x2="380" y2="420" stroke="#4d7fff" stroke-width="1" opacity="0.25"/>

  <!-- Cross connections -->
  <line x1="380" y1="100" x2="440" y2="240" stroke="#819ffe" stroke-width="0.8" opacity="0.15"/>
  <line x1="420" y1="160" x2="400" y2="300" stroke="#819ffe" stroke-width="0.8" opacity="0.15"/>
  <line x1="440" y1="240" x2="380" y2="420" stroke="#819ffe" stroke-width="0.8" opacity="0.15"/>

  <!-- Data stream particles dissolving from R -->
  <circle cx="355" cy="140" r="2" fill="#819ffe" opacity="0.7"/>
  <circle cx="365" cy="200" r="1.5" fill="#4d7fff" opacity="0.6"/>
  <circle cx="370" cy="250" r="2" fill="#819ffe" opacity="0.5"/>
  <circle cx="360" cy="310" r="1.5" fill="#4d7fff" opacity="0.6"/>
  <circle cx="355" cy="360" r="2" fill="#819ffe" opacity="0.4"/>
  <circle cx="365" cy="400" r="1.5" fill="#4d7fff" opacity="0.5"/>

  <!-- The R — solid on left, dissolving/merging into AI on right -->
  <path d="M120 100 L120 412 L168 412 L168 285 L250 285 L320 412 L374 412 L296 276 C340 258 368 218 368 172 C368 124 332 100 278 100 Z M168 140 L268 140 C314 140 330 160 330 172 C330 192 314 240 268 240 L168 240 Z" fill="url(#rGrad)"/>

  <!-- Glowing merge point where R meets AI -->
  <circle cx="350" cy="270" r="12" fill="#4d7fff" opacity="0.3" filter="url(#bigGlow)"/>
  <circle cx="350" cy="270" r="6" fill="#819ffe" opacity="0.7" filter="url(#glow)"/>

  <!-- Bottom-left subtle circuit accent -->
  <line x1="60" y1="452" x2="140" y2="452" stroke="url(#circuit)" stroke-width="1.5"/>
  <circle cx="60" cy="452" r="3" fill="#4d7fff" opacity="0.3"/>
  <circle cx="140" cy="452" r="3" fill="#819ffe" opacity="0.4"/>
</svg>
